    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-5">
                <div class="card shadow fw-bold text-center">
                    <div class="card-title">BMI Calculator</div>
                    <div class="card-body p-4"><div class="mb-3 text-start">
                        <label class="form-label">Weight(kg)</label>
                        <input id="weight" type="text" class="form-control" placeholder="eg-70">
                        </div>
                        <div class="mb-3 text-start">
                        <label class="form-label">Height(cm)</label>
                        <input id="height" type="text" class="form-control mb-4" placeholder="eg-175">
                        </div>
                        <div class="d-flex gap-2">
                        <button type="button"onclick="calculator()"  class="btn btn-primary btn-outline-light  w-100">calculate</button>
                        <button type="button" onclick="resetForm()" class="btn btn-outline-light btn-success w-100">Reset</button>
                     </div>
                        <div class="mt-4 pt-3 border-top border-light">
    <div class="d-flex justify-content-between small text-white-50">
        <span class=" badge bg-primary">Underweight: < 18.5</span>
        <span class="badge bg-success">Healthy: 18.5 - 24.9</span>
        <span class="badge bg-warning text-dark">Overweight: > 25</span>
    </div>
</div>
                        <div id="result" class="mb-3 h5 text-muted">your result will appear here.</div>
                        <div id="health-tips" class="mt-4"> <p class="small text-dark">Want to improve your score?</p>
    <a href="https://www.who.int/news-room/fact-sheets/detail/healthy-diet" 
       target="_blank" 
       class="btn btn-outline-dark btn-sm w-100 fw-bold">
       View Healthy Living Guide 🥗

        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function calculator(){
     let w=document.getElementById('weight').value;
     let h=document.getElementById('height').value;
     if(w>0 && h>0){
    var height=h/100;
    let bmi=w/(height*height);
    document.getElementById('result').innerHTML="your BMI is:"+bmi.toFixed(1);  
     }else{
        alert("please enter valid numbers for weight and height");
     }
    }
    function resetForm(){
      document.getElementById('weight').value="";
      document.getElementById('height').value="";
      document.getElementById('result').innerHTML="";
    }
</script>
</body>
