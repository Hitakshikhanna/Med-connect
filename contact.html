<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
     <style>
        body {
            background: linear-gradient(135deg, #37c7c0 0%, #e8f5e9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
     </style>
</head>
<body>
    <div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 border p-4 rounded shadow-sm bg-white">
            
            <h3 class="mb-4 text-center">Contact Us</h3>

            <form>
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@example.com">
                </div>
                <div class="mb-3">
                    <label for="form-label">subject</label>
                    <input type="text" class="form-control"placeholder="report a bug/request a update/or issue faced">
                </div>

                <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="4" placeholder="How can we help?"></textarea>
                </div>

                <button type="submit" class="btn btn-primary w-100">Send Message</button>
            </form>

        </div>
    </div>
</div>
</body>
</html>
