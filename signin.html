<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED-Connect | Join Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e0f2f1 0%, #e8f5e9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .auth-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .btn-primary-custom {
            background-color: #00796b;
            border: none;
            color: white;
        }
        .btn-primary-custom:hover {
            background-color: #004d40;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 mx-2 my-3">
            <div class="card auth-card p-4">
                <h3 class="text-center mb-4" style="color: #00796b;">Welcome Back</h3>
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="loginEmail" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="loginPassword" class="form-label">Password</label>
                        <input type="password" class="form-control" id="loginPassword" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100 py-2">Sign In</button>
                </form>
            </div>
        </div>

        <div class="col-md-5 mx-2 my-3">
            <div class="card auth-card p-4">
                <h3 class="text-center mb-4" style="color: #2e7d32;">Create Free Account</h3>
                <form id="signupForm">
                    <div class="mb-3">
                        <label for="signupName" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="signupName" placeholder="Your Name" required>
                    </div>
                    <div class="mb-3">
                        <label for="signupEmail" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="signupEmail" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="signupPassword" class="form-label">Create Password</label>
                        <input type="password" class="form-control" id="signupPassword" placeholder="Min. 6 characters" required>
                    </div>
                    <button type="submit" class="btn w-100 py-2 text-white" style="background-color: #2e7d32;">Register</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
